<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Portfolio System</title>

<style>
body{
  margin:0;
  font-family: -apple-system, Arial;
  background:#0a0a0a;
  color:#fff;
}

/* ===== HERO ===== */
.hero{
  height:90vh;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
}

.hero h1{
  font-size:52px;
  letter-spacing:4px;
}

.hero p{
  opacity:0.6;
}

/* ===== 产品模块基础 ===== */
.product{
  padding:120px 8%;
  border-radius:30px;
  margin:80px auto;
  width:85%;

  display:flex;
  flex-direction:column;
  gap:25px;

  box-shadow: 0 20px 60px rgba(0,0,0,0.3);

  opacity:0;
  transform:translateY(40px);
  transition:0.8s;
}

.product.show{
  opacity:1;
  transform:translateY(0);
}

/* ===== 不同产品主题色 ===== */
.theme1{
  background: #000; /* 纯黑 */
}

.theme2{
  background: #fff; /* 纯白 */
  color:#111;
}

.theme3{
  background: linear-gradient(145deg, #151010, #241818);
}

/* ===== 标题 ===== */
.product h2{
  font-size:26px;
  letter-spacing:2px;
  margin:0;
  opacity:0.9;
}

/* ===== 视频（缩小嵌入） ===== */
.product video{
  width:60%;
  border-radius:18px;
  align-self:center;
  opacity:0.95;
}

/* ===== 主图 ===== */
.main-img{
  width:75%;
  max-width:900px;
  border-radius:18px;
  align-self:center;
}

/* ===== 缩略图 ===== */
.thumbs{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
}

.thumbs img{
  width:90px;
  height:60px;
  object-fit:cover;
  border-radius:8px;
  cursor:pointer;
  opacity:0.5;
  transition:0.3s;
}

.thumbs img:hover{
  opacity:1;
  transform:scale(1.05);
}

/* 特殊白色主题缩略图文字颜色 */
.theme2 .thumbs img{
  border:2px solid #ddd;
}

/* About */
.about{
  padding:140px 8%;
  text-align:center;
  opacity:0.6;
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>VISUAL PORTFOLIO</h1>
  <p>Product / Motion / 3D</p>
</div>

<!-- ===== 产品1 ===== -->
<div class="product theme1">
  <h2>Razer Huntsman V3 Pro｜质感光影动画</h2>

  <video autoplay muted loop playsinline>
    <source src="sp/jianpan1.mp4">
  </video>

  <img id="a" class="main-img" src="jianpan1/22.jpg">

  <div class="thumbs">
    <img src="jianpan1/22.jpg" onclick="changeImg('a',this)">
    <img src="jianpan1/33.jpg" onclick="changeImg('a',this)">
    <img src="jianpan1/正1.jpg" onclick="changeImg('a',this)">
    <img src="jianpan1/特1.jpg" onclick="changeImg('a',this)">
  </div>
</div>

<!-- ===== 产品2 ===== -->
<div class="product theme2">
  <h2>PRODUCT B - CG Model</h2>

   <video autoplay muted loop playsinline>
    <source src="sp/jianpan1.mp4">
  </video>
  <img id="b" class="main-img" src="images/b1.jpg">

  <div class="thumbs">
    <img src="images/b1.jpg" onclick="changeImg('b',this)">
    <img src="images/b2.jpg" onclick="changeImg('b',this)">
    <img src="images/b3.jpg" onclick="changeImg('b',this)">
  </div>
</div>

<!-- ===== 产品3 ===== -->
<div class="product theme3">
  <h2>PRODUCT C - Render Set</h2>

  <img id="c" class="main-img" src="images/c1.jpg">

  <div class="thumbs">
    <img src="images/c1.jpg" onclick="changeImg('c',this)">
    <img src="images/c2.jpg" onclick="changeImg('c',this)">
    <img src="images/c3.jpg" onclick="changeImg('c',this)">
  </div>
</div>

<!-- ABOUT -->
<div class="about">
  <h2>ABOUT</h2>
  <p>Visual Design / 3D / Motion</p>
</div>

<script>
function changeImg(id,el){
  document.getElementById(id).src = el.src;
}

/* scroll reveal */
const items=document.querySelectorAll('.product');
const observer=new IntersectionObserver(e=>{
  e.forEach(i=>{
    if(i.isIntersecting)i.target.classList.add('show');
  });
},{threshold:0.2});

items.forEach(i=>observer.observe(i));
</script>

</body>
</html>
