<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Product Portfolio</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
  overflow-x:hidden;
}

/* ====== 顶部封面 ====== */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  position:relative;
  text-align:center;
}

.hero video{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
  filter: brightness(0.6);
}

.hero h1{
  font-size:64px;
  letter-spacing:6px;
  margin:0;
}

.hero p{
  opacity:0.7;
}

/* ====== 产品模块 ====== */
.product{
  padding:140px 10%;
  border-top:1px solid rgba(255,255,255,0.08);

  opacity:0;
  transform: translateY(60px);
  transition: all 1s ease;
}

.product.show{
  opacity:1;
  transform: translateY(0);
}

.product h2{
  font-size:28px;
  letter-spacing:2px;
  margin-bottom:30px;
}

/* 视频 */
.product video{
  width:100%;
  border-radius:24px;
  margin-bottom:30px;
  transform: scale(1);
  transition:0.5s;
}

.product video:hover{
  transform: scale(1.01);
}

/* 主图 */
.main-img{
  width:100%;
  max-width:1100px;
  display:block;
  margin:20px auto;
  border-radius:24px;
  transition:0.4s;
}

/* 缩略图 */
.thumbs{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:12px;
  margin-top:20px;
}

.thumbs img{
  width:110px;
  height:70px;
  object-fit:cover;
  border-radius:10px;
  cursor:pointer;
  opacity:0.5;
  transition:0.3s;
}

.thumbs img:hover{
  opacity:1;
  transform:scale(1.05);
}

/* About */
.about{
  padding:160px 10%;
  text-align:center;
  opacity:0.6;
}

/* ====== 淡入动画JS辅助 ====== */
</style>
</head>

<body>

<!-- ===== HERO ===== -->
<div class="hero">
  <video autoplay muted loop playsinline>
    <source src="cover.webm">
  </video>
  <h1>PRODUCT WORLD</h1>
  <p>Visual / 3D / Motion</p>
</div>

<!-- ===== 产品 A（视频 + 图） ===== -->
<div class="product">
  <h2>PRODUCT A</h2>

  <video autoplay muted loop playsinline>
    <source src="sp/jianpan1.mp4" type="video/mp4">
  </video>

  <img id="mainA" class="main-img" src="images/a1.jpg">

  <div class="thumbs">
    <img src="images/a1.jpg" onclick="changeImg('mainA',this)">
    <img src="images/a2.jpg" onclick="changeImg('mainA',this)">
    <img src="images/a3.jpg" onclick="changeImg('mainA',this)">
  </div>
</div>

<!-- ===== 产品 B（纯图片） ===== -->
<div class="product">
  <h2>PRODUCT B</h2>

  <img id="mainB" class="main-img" src="images/b1.jpg">

  <div class="thumbs">
    <img src="images/b1.jpg" onclick="changeImg('mainB',this)">
    <img src="images/b2.jpg" onclick="changeImg('mainB',this)">
    <img src="images/b3.jpg" onclick="changeImg('mainB',this)">
  </div>
</div>

<!-- ===== 产品 C（示例） ===== -->
<div class="product">
  <h2>PRODUCT C</h2>

  <img id="mainC" class="main-img" src="images/c1.jpg">

  <div class="thumbs">
    <img src="images/c1.jpg" onclick="changeImg('mainC',this)">
    <img src="images/c2.jpg" onclick="changeImg('mainC',this)">
    <img src="images/c3.jpg" onclick="changeImg('mainC',this)">
  </div>
</div>

<!-- ===== ABOUT ===== -->
<div class="about">
  <h2>ABOUT ME</h2>
  <p>Visual Design / 3D / Motion / Interaction</p>
</div>

<script>

/* 图片切换 */
function changeImg(id,el){
  document.getElementById(id).src = el.src;
}

/* ===== 滚动淡入（Apple效果核心） ===== */
const items = document.querySelectorAll('.product');

const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add('show');
    }
  });
},{ threshold:0.15 });

items.forEach(el=>observer.observe(el));

</script>

</body>
</html>
