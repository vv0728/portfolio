<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Portfolio System</title>

<style>
body{
  margin:0;
  font-family:-apple-system, Arial;
  background:#0a0a0a;
  color:#fff;
}

/* ===== HERO ===== */
.hero{
  height:90vh;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
}

.hero h1{font-size:52px;letter-spacing:4px;}
.hero p{opacity:0.6;}

/* ===== PRODUCT ===== */
.product{
  padding:120px 8%;
  border-radius:30px;
  margin:80px auto;
  width:85%;
  display:flex;
  flex-direction:column;
  gap:25px;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
  opacity:0;
  transform:translateY(40px);
  transition:0.8s;
}

.product.show{
  opacity:1;
  transform:translateY(0);
}

/* ===== THEMES ===== */
.theme1{background:#000;}
.theme2{background:#fff;color:#111;}
.theme3{background:linear-gradient(145deg,#151010,#241818);}

/* 🚗 CT5 */
.theme4{
  background:linear-gradient(145deg,#0b0b0f,#1a1a22);
}

/* 💍 ring */
.theme5{
  background:linear-gradient(145deg,#f7f7f7,#dcdcdc);
  color:#111;
}

/* fix button in white bg */
.theme5 .viewer button{
  background:rgba(0,0,0,0.08);
  color:#111;
}

/* 📦 gallery */
.theme6{
  background:#111;
}

/* 🎨 scene */
.theme7{
  background:linear-gradient(135deg,#120b1f,#1b1440);
}

/* ===== TITLE ===== */
.product h2{
  font-size:26px;
  letter-spacing:2px;
  margin:0;
}

/* ===== VIEWER ===== */
.viewer{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:20px;
}

.viewer button{
  width:42px;height:42px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  background:rgba(120,120,120,0.25);
  color:#111;
  backdrop-filter:blur(6px);
  transition:0.3s;
}

.viewer button:hover{
  transform:scale(1.05);
  background:rgba(120,120,120,0.4);
}

/* dark themes */
.theme1 .viewer button,
.theme3 .viewer button,
.theme4 .viewer button,
.theme7 .viewer button{
  color:#fff;
  background:rgba(255,255,255,0.12);
}

/* image */
.main-img{
  width:100%;
  max-width:800px;
  height:500px;
  object-fit:contain;
  border-radius:18px;
  background:#111;
}

/* thumbs */
.thumbs{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
}

.thumbs img{
  width:90px;
  height:60px;
  object-fit:cover;
  border-radius:8px;
  cursor:pointer;
  opacity:0.5;
  transition:0.3s;
}

.thumbs img.active{
  opacity:1;
  transform:scale(1.15);
  border:2px solid #fff;
}

/* ===== gallery ===== */
.gallery{
  column-count:2;
  column-gap:15px;
}

.gallery img{
  width:100%;
  margin-bottom:15px;
  border-radius:12px;
  break-inside:avoid;
  transition:0.3s;
}

.gallery img:hover{
  transform:scale(1.02);
}

/* ===== ABOUT ===== */
.about{
  padding:140px 8%;
  text-align:center;
  opacity:0.6;
}
</style>
</head>

<body>

<div class="hero">
  <h1>VISUAL PORTFOLIO</h1>
  <p>Product / Motion / 3D</p>
</div>

<!-- ===== A ===== -->
<div class="product theme1">
  <h2>Keyboard Animation</h2>
</div>

<!-- ===== B ===== -->
<div class="product theme2">
  <h2>Mobile CG</h2>
</div>

<!-- ===== C ===== -->
<div class="product theme3">
  <h2>Render Set</h2>
</div>

<!-- ===== D CT5 ===== -->
<div class="product theme4">
  <h2>Cadillac CT5</h2>

  <div class="viewer">
    <button onclick="prevImg('d')">←</button>
    <img id="d" class="main-img" src="car/1.jpg">
    <button onclick="nextImg('d')">→</button>
  </div>

  <div class="thumbs">
    <img src="car/1.jpg" onclick="setImg('d',this,0)">
    <img src="car/2.jpg" onclick="setImg('d',this,1)">
    <img src="car/3.jpg" onclick="setImg('d',this,2)">
  </div>
</div>

<!-- ===== E RING ===== -->
<div class="product theme5">
  <h2>Diamond Ring</h2>

  <div class="viewer">
    <button onclick="prevImg('e')">←</button>
    <img id="e" class="main-img" src="ring/1.jpg">
    <button onclick="nextImg('e')">→</button>
  </div>

  <div class="thumbs">
    <img src="ring/1.jpg" onclick="setImg('e',this,0)">
    <img src="ring/2.jpg" onclick="setImg('e',this,1)">
    <img src="ring/3.jpg" onclick="setImg('e',this,2)">
  </div>
</div>

<!-- ===== F GALLERY ===== -->
<div class="product theme6">
  <h2>Render Collection</h2>

  <div class="gallery">
    <img src="mix/1.jpg">
    <img src="mix/2.jpg">
    <img src="mix/3.jpg">
    <img src="mix/4.jpg">
    <img src="mix/5.jpg">
    <img src="mix/6.jpg">
  </div>
</div>

<!-- ===== G SCENE ===== -->
<div class="product theme7">
  <h2>Atmospheric Scene</h2>

  <div class="viewer">
    <button onclick="prevImg('f')">←</button>
    <img id="f" class="main-img" src="scene/1.jpg">
    <button onclick="nextImg('f')">→</button>
  </div>

  <div class="thumbs">
    <img src="scene/1.jpg" onclick="setImg('f',this,0)">
    <img src="scene/2.jpg" onclick="setImg('f',this,1)">
    <img src="scene/3.jpg" onclick="setImg('f',this,2)">
  </div>
</div>

<div class="about">
  <h2>ABOUT</h2>
</div>

<script>
const imgList={
  d:["car/1.jpg","car/2.jpg","car/3.jpg"],
  e:["ring/1.jpg","ring/2.jpg","ring/3.jpg"],
  f:["scene/1.jpg","scene/2.jpg","scene/3.jpg"]
};

const indexMap={d:0,e:0,f:0};

function setImg(id,el,i){
  document.getElementById(id).src=el.src;
  indexMap[id]=i;
}

function nextImg(id){
  indexMap[id]=(indexMap[id]+1)%imgList[id].length;
  update(id);
}

function prevImg(id){
  indexMap[id]=(indexMap[id]-1+imgList[id].length)%imgList[id].length;
  update(id);
}

function update(id){
  document.getElementById(id).src=imgList[id][indexMap[id]];
}

/* scroll animation */
const items=document.querySelectorAll('.product');
const ob=new IntersectionObserver(e=>{
  e.forEach(i=>{
    if(i.isIntersecting)i.target.classList.add('show');
  });
},{threshold:0.2});

items.forEach(i=>ob.observe(i));
</script>

</body>
</html>
</body>
</html>
