<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Portfolio</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: Arial;
  overflow-x: hidden;
}

.section {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
}

h1 {
  font-size: 60px;
}

.project {
  padding: 100px 20px;
}

.project img, .project video {
  width: 80%;
  border-radius: 20px;
}
</style>

</head>

<body>

<!-- 封面 -->
<div class="section">
  <video autoplay muted loop playsinline>
    <source src="cover.webm" type="video/webm">
  </video>

  <h1>离开世界之前</h1>
  <p>一切都是过程</p>
</div>

<!-- 项目1 -->
<div class="project">
  <h2>Project 01</h2>
  <video autoplay loop muted playsinline>
    <source src="project1.webm" type="video/webm">
  </video>
  <p>这是你的作品描述</p>
</div>

<!-- 项目2 -->
<div class="project">
  <h2>Project 02</h2>
  <img src="project2.jpg">
  <p>这是你的作品描述</p>
</div>

<!-- About -->
<div class="section">
  <h2>About Me</h2>
  <p>视觉设计 / 3D / 动效</p>
</div>

</body>
</html>
