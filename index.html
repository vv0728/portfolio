
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Portfolio</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: Arial;
  overflow-x: hidden;
}

/* 封面 */
.section {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  position: relative;
}

.section video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
}

h1 {
  font-size: 60px;
  letter-spacing: 4px;
}

h2 {
  margin-bottom: 20px;
}

/* 项目 */
.project {
  padding: 150px 20px;
  text-align: center;
}

.main-img {
  width: 70%;
  border-radius: 20px;
  margin-bottom: 20px;
}

/* 缩略图 */
.thumbs img {
  width: 120px;
  margin: 10px;
  cursor: pointer;
  opacity: 0.5;
  transition: 0.3s;
  border-radius: 10px;
}

.thumbs img:hover {
  opacity: 1;
  transform: scale(1.05);
}

/* 视频 */
.project video {
  width: 80%;
  border-radius: 20px;
  margin-bottom: 20px;
}

/* About */
.about {
  padding: 200px 20px;
  text-align: center;
  opacity: 0.8;
}
</style>

</head>

<body>

<!-- 封面 -->
<div class="section">
  <video autoplay muted loop playsinline>
    <source src="cover.webm" type="video/webm">
  </video>

  <h1>离开世界之前</h1>
  <p>一切都是过程</p>
</div>

<!-- 项目1（视频型） -->
<div class="project">
  <h2>Project 01</h2>

  <video autoplay loop muted playsinline>
    <source src="sp/jianpan1.mp4" type="video/mp4">
  </video>

  <p>这是你的作品描述</p>
</div>

<!-- 项目2（图片切换型） -->
<div class="project">
  <h2>Project 02</h2>

  <!-- 主图 -->
  <img id="mainImage1" src="ct5.jpg" class="main-img">

  <!-- 缩略图 -->
  <div class="thumbs">
    <img src="ct5d.jpg" onclick="changeImg('mainImage1', this)">
    <img src="ct5d侧.jpg" onclick="changeImg('mainImage1', this)">
    <img src="ct5d侧正.jpg" onclick="changeImg('mainImage1', this)">
     <img src="ct5光1.jpg" onclick="changeImg('mainImage1', this)">
     <img src="CT5光2.jpg" onclick="changeImg('mainImage1', this)">
      <img src="ct5轮.jpg" onclick="changeImg('mainImage1', this)">
     <img src="ct5正.jpg" onclick="changeImg('mainImage1', this)">
     
  </div>

  <p>这是你的作品描述</p>
</div>

<!-- About -->
<div class="about">
  <h2>About Me</h2>
  <p>视觉设计 / 3D / 动效</p>
</div>

<script>
function changeImg(id, el){
  document.getElementById(id).src = el.src;
}
</script>

</body>
</html>
